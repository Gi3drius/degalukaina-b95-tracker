name: Update fuel prices

on:
  workflow_dispatch:
  schedule:
    # Runs every day at 06:00 UTC. Adjust if needed.
    - cron: "0 6 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Scrape configured stations
        run: python3 scrape_degalukaina.py --db fuel_prices.db

      - name: Export static JSON for GitHub Pages
        run: python3 export_fuel_history.py --db fuel_prices.db --output docs/data/fuel_prices.json

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update fuel price history"
          file_pattern: fuel_prices.db docs/data/fuel_prices.json
